<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhaleRadar UI</title>
    <style>
        :root {
            --primary-green: #54b489;
            --bg-light: #f9f9fb;
            --text-dark: #333;
            --text-gray: #888;
            --white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            width: 360px; /* مقاس الإضافة المثالي */
            height: 580px;
            overflow: hidden;
        }

        /* --- صفحة الترحيب (Splash Screen) --- */
        #splash-screen {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            height: 100%;
            background: url('https://i.ibb.co/fdqTzzqG/8-AB3-A053-1596-4-F86-BD00-B16-C1-AA09327.png') no-repeat center center;
            background-size: cover;
            padding-bottom: 50px;
            box-sizing: border-box;
        }

        .get-started-btn {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 14px 60px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(84, 180, 137, 0.3);
            transition: transform 0.2s;
        }

        .get-started-btn:active {
            transform: scale(0.95);
        }

        /* --- صفحة الأسواق (Dashboard) --- */
        #dashboard {
            display: none; /* مخفية في البداية */
            flex-direction: column;
            height: 100%;
            background-color: var(--white);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .header span { font-size: 16px; color: var(--text-dark); }
        .header img { height: 24px; }

        .markets-section {
            padding: 20px 15px;
        }

        .markets-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .markets-header h2 { margin: 0; font-size: 20px; font-weight: 400; }
        .markets-header a { color: var(--primary-green); text-decoration: none; font-size: 14px; }

        .coin-list {
            background-color: #f1f7f5;
            border-radius: 15px;
            padding: 5px 0;
        }

        .coin-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .coin-item:last-child { border-bottom: none; }

        .coin-icon {
            width: 32px;
            height: 32px;
            margin-right: 15px;
            border-radius: 50%;
        }

        .coin-info { flex: 1; }
        .coin-name { font-weight: bold; font-size: 16px; color: var(--text-dark); }
        
        .coin-price-info { text-align: right; }
        .coin-price { display: block; font-weight: 500; font-size: 16px; }
        .price-change { font-size: 13px; font-weight: bold; }
        .positive { color: #2ebd85; }
        .negative { color: #f6465d; }

    </style>
</head>
<body>

    <div id="splash-screen">
        <button class="get-started-btn" onclick="showDashboard()">Get Started</button>
    </div>

    <div id="dashboard">
        <div class="header">
            <span>Aide</span>
            <img src="https://i.ibb.co/7Fzz9BW/0-E6-AB82-C-D098-4413-8-B3-E-67-A1-A18-CD2-EA.png" alt="Logo"> <div style="font-size: 20px;">☰</div>
        </div>

        <div class="markets-section">
            <div class="markets-header">
                <h2>Markets</h2>
                <a href="#">See All</a>
            </div>

            <div class="coin-list">
                <div class="coin-item">
                    <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png" class="coin-icon" alt="BTC">
                    <div class="coin-info"><span class="coin-name">BTC</span></div>
                    <div class="coin-price-info">
                        <span class="coin-price">$69,626</span>
                        <span class="price-change positive">+1.2%</span>
                    </div>
                </div>
                <div class="coin-item">
                    <img src="https://cryptologos.cc/logos/ethereum-eth-logo.png" class="coin-icon" alt="ETH">
                    <div class="coin-info"><span class="coin-name">ETH</span></div>
                    <div class="coin-price-info">
                        <span class="coin-price">$2,024</span>
                        <span class="price-change positive">+0.1%</span>
                    </div>
                </div>
                <div class="coin-item">
                    <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="coin-icon" alt="USDT">
                    <div class="coin-info"><span class="coin-name">USDT</span></div>
                    <div class="coin-price-info">
                        <span class="coin-price">$0.999</span>
                        <span class="price-change negative">-0.0%</span>
                    </div>
                </div>
                <div class="coin-item">
                    <img src="https://cryptologos.cc/logos/bnb-bnb-logo.png" class="coin-icon" alt="BNB">
                    <div class="coin-info"><span class="coin-name">BNB</span></div>
                    <div class="coin-price-info">
                        <span class="coin-price">$640.94</span>
                        <span class="price-change positive">+0.2%</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showDashboard() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
        }
    </script>
</body>
</html>
