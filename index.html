<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge - Financial Freedom</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
        }

        /* ========== الهيدر العلوي ========== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            border-bottom: 1px solid #e5e7eb;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .icon-btn:hover {
            background: #f3f4f6;
        }

        .icon-btn svg {
            width: 24px;
            height: 24px;
            stroke: #374151;
            stroke-width: 2;
            fill: none;
        }

        /* ========== الصفحة الأولى - الترحيب ========== */
        .welcome-page {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 100px 40px 60px;
            animation: fadeIn 0.5s ease;
        }

        .welcome-page.hidden {
            display: none;
        }

        /* اللغو الأول - كبير جداً */
        .logo-container {
            margin-bottom: 80px;
        }

        .logo-container img {
            width: 200px;
            height: 200px;
            object-fit: contain;
            filter: drop-shadow(0 8px 24px rgba(0,0,0,0.12));
        }

        /* العنوان */
        .title {
            font-size: 56px;
            font-weight: 300;
            color: #1a1a1a;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .title .highlight {
            color: #10b981;
            font-weight: 400;
        }

        /* الوصف */
        .subtitle {
            font-size: 20px;
            color: #4b5563;
            font-weight: 400;
            line-height: 1.6;
            margin-bottom: 100px;
            max-width: 480px;
        }

        /* الزر الأخضر */
        .btn-primary {
            background: linear-gradient(135deg, #7db889 0%, #6aa076 100%);
            color: white;
            border: none;
            padding: 20px 72px;
            font-size: 18px;
            font-weight: 500;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 32px rgba(125, 184, 137, 0.4);
            transition: all 0.3s ease;
            margin-bottom: 28px;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(125, 184, 137, 0.5);
        }

        /* الرابط السفلي */
        .footer-text {
            font-size: 17px;
            color: #6b7280;
            font-weight: 400;
        }

        .footer-text a {
            color: #10b981;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .footer-text a:hover {
            color: #059669;
        }

        /* ========== صفحة تسجيل الدخول ========== */
        .login-page {
            width: 100%;
            min-height: 100vh;
            display: none;
            flex-direction: column;
            background: #f8f9fa;
            animation: fadeIn 0.4s ease;
            padding-top: 80px;
        }

        .login-page.active {
            display: flex;
        }

        /* محتوى تسجيل الدخول */
        .login-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 40px 80px;
        }

        /* اللغو الثاني - كبير جداً */
        .login-logo {
            margin-bottom: 70px;
        }

        .login-logo img {
            width: 200px;
            height: 200px;
            object-fit: contain;
            filter: drop-shadow(0 8px 24px rgba(0,0,0,0.12));
        }

        /* الحقول */
        .input-group {
            width: 100%;
            max-width: 420px;
            margin-bottom: 20px;
            position: relative;
        }

        .input-field {
            width: 100%;
            background: #f0f2f5;
            border: none;
            border-radius: 20px;
            padding: 22px 60px 22px 26px;
            font-size: 18px;
            color: #1a1a1a;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            outline: none;
            transition: all 0.2s;
        }

        .input-field::placeholder {
            color: #6b7280;
        }

        .input-field:focus {
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        /* أيقونات الحقول */
        .input-icon {
            position: absolute;
            right: 22px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .check-icon {
            width: 24px;
            height: 24px;
            color: #10b981;
        }

        .eye-icon {
            width: 26px;
            height: 26px;
            color: #6b7280;
            cursor: pointer;
        }

        /* زر تسجيل الدخول - غير نشط */
        .btn-login {
            width: 100%;
            max-width: 420px;
            background: #c8ddd4;
            color: white;
            border: none;
            padding: 20px;
            font-size: 18px;
            font-weight: 500;
            border-radius: 50px;
            cursor: not-allowed;
            margin-top: 32px;
            margin-bottom: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        /* زر تسجيل الدخول - نشط (أخضر) */
        .btn-login.active {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            cursor: pointer;
            box-shadow: 0 10px 32px rgba(16, 185, 129, 0.4);
        }

        .btn-login.active:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(16, 185, 129, 0.5);
        }

        /* زر إنشاء حساب */
        .btn-create {
            width: 100%;
            max-width: 420px;
            background: #e5e7eb;
            color: #1a1a1a;
            border: none;
            padding: 20px;
            font-size: 18px;
            font-weight: 500;
            border-radius: 50px;
            cursor: pointer;
            margin-bottom: 28px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .btn-create:hover {
            background: #d1d5db;
        }

        /* نسيت كلمة المرور */
        .forgot-link {
            color: #10b981;
            text-decoration: none;
            font-size: 17px;
            font-weight: 500;
            margin-bottom: 60px;
            cursor: pointer;
        }

        .forgot-link:hover {
            color: #059669;
        }

        /* QR Code */
        .qr-code {
            width: 80px;
            height: 80px;
        }

        .qr-code svg {
            width: 100%;
            height: 100%;
        }

        /* تأثيرات */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-page > * {
            animation: fadeInUp 0.6s ease forwards;
        }

        .logo-container { animation-delay: 0.1s; }
        .title { animation-delay: 0.2s; }
        .subtitle { animation-delay: 0.3s; }
        .btn-primary { animation-delay: 0.4s; }
        .footer-text { animation-delay: 0.5s; }

        .login-content > * {
            animation: fadeInUp 0.5s ease forwards;
        }

        .login-logo { animation-delay: 0.1s; }
        .input-group:nth-child(2) { animation-delay: 0.2s; }
        .input-group:nth-child(3) { animation-delay: 0.3s; }
        .btn-login { animation-delay: 0.4s; }
        .btn-create { animation-delay: 0.5s; }
        .forgot-link { animation-delay: 0.6s; }
        .qr-code { animation-delay: 0.7s; }

        /* توافق الحاسوب الكبير */
        @media (min-width: 1024px) {
            .header {
                padding: 20px 60px;
            }

            .logo-container img, .login-logo img {
                width: 240px;
                height: 240px;
            }

            .title {
                font-size: 64px;
            }

            .subtitle {
                font-size: 22px;
                max-width: 560px;
            }

            .input-group, .btn-login, .btn-create {
                max-width: 480px;
            }
        }

        /* توافق الجوال */
        @media (max-width: 640px) {
            .header {
                padding: 14px 20px;
            }

            .logo-text {
                font-size: 20px;
            }

            .header-right {
                gap: 16px;
            }

            .welcome-page, .login-content {
                padding-left: 24px;
                padding-right: 24px;
            }

            .logo-container img, .login-logo img {
                width: 160px;
                height: 160px;
            }

            .title {
                font-size: 40px;
            }

            .subtitle {
                font-size: 17px;
            }
        }
    </style>
</head>
<body>
    <!-- ========== الهيدر العلوي ========== -->
    <header class="header">
        <div class="header-left">
            <!-- اللغو الصغير في الهيدر -->
            <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
                <rect x="4" y="12" width="12" height="16" rx="2" fill="#10b981"/>
                <rect x="18" y="4" width="10" height="20" rx="2" fill="#6ee7b7"/>
            </svg>
            <span class="logo-text">edge</span>
        </div>
        <div class="header-right">
            <!-- أيقونة البحث -->
            <div class="icon-btn">
                <svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                </svg>
            </div>
            <!-- أيقونة القائمة -->
            <div class="icon-btn">
                <svg viewBox="0 0 24 24">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </div>
        </div>
    </header>

    <!-- ========== الصفحة الأولى - الترحيب ========== -->
    <div class="welcome-page" id="welcomePage">
        <!-- اللغو الأول الكبير -->
        <div class="logo-container">
            <img src="https://i.ibb.co/Mk8KKTJ9/49-E2-B7-AD-63-C1-481-F-82-A1-D0827-AE9-AD11.png" alt="Edge Logo">
        </div>

        <h1 class="title">
            Welcome to<br>
            Financial <span class="highlight">Freedom</span>
        </h1>

        <p class="subtitle">
            Edge is the open source tool you need to invest, secure, and put your crypto in action.
        </p>

        <button class="btn-primary" onclick="showLogin()">Get Started</button>

        <p class="footer-text">
            Already have an account? <a onclick="showLogin()">Sign in</a>
        </p>
    </div>

    <!-- ========== صفحة تسجيل الدخول ========== -->
    <div class="login-page" id="loginPage">
        <div class="login-content">
            <!-- اللغو الثاني الكبير -->
            <div class="login-logo">
                <img src="https://i.ibb.co/GfZvNh7z/1-EA82644-04-AB-4694-AD14-0-A0-E58-CBAC3-C.png" alt="Edge Logo">
            </div>

            <!-- حقل اسم المستخدم -->
            <div class="input-group">
                <input type="text" class="input-field" placeholder="Nom d'utilisateur" id="usernameField" oninput="checkInputs()">
                <span class="input-icon">
                    <svg class="check-icon" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                    </svg>
                </span>
            </div>

            <!-- حقل كلمة المرور -->
            <div class="input-group">
                <input type="password" class="input-field" placeholder="Mot de passe" id="passwordField" oninput="checkInputs()">
                <span class="input-icon" onclick="togglePassword()">
                    <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </span>
            </div>

            <!-- زر تسجيل الدخول -->
            <button class="btn-login" id="loginBtn" disabled>Se connecter</button>

            <!-- زر إنشاء حساب -->
            <button class="btn-create">Créer un compte</button>

            <!-- نسيت كلمة المرور -->
            <a class="forgot-link">Mot de passe oublié</a>

            <!-- QR Code -->
            <div class="qr-code">
                <svg viewBox="0 0 80 80" fill="none">
                    <rect x="12" y="12" width="20" height="20" fill="#1a1a1a"/>
                    <rect x="16" y="16" width="12" height="12" fill="white"/>
                    <rect x="18" y="18" width="8" height="8" fill="#1a1a1a"/>
                    
                    <rect x="48" y="12" width="20" height="20" fill="#1a1a1a"/>
                    <rect x="52" y="16" width="12" height="12" fill="white"/>
                    <rect x="54" y="18" width="8" height="8" fill="#1a1a1a"/>
                    
                    <rect x="12" y="48" width="20" height="20" fill="#1a1a1a"/>
                    <rect x="16" y="52" width="12" height="12" fill="white"/>
                    <rect x="18" y="54" width="8" height="8" fill="#1a1a1a"/>
                    
                    <rect x="36" y="12" width="6" height="6" fill="#1a1a1a"/>
                    <rect x="12" y="36" width="6" height="6" fill="#1a1a1a"/>
                    <rect x="36" y="36" width="6" height="6" fill="#1a1a1a"/>
                    <rect x="62" y="36" width="6" height="6" fill="#1a1a1a"/>
                    <rect x="36" y="62" width="6" height="6" fill="#1a1a1a"/>
                    
                    <rect x="48" y="48" width="6" height="6" fill="#1a1a1a"/>
                    <rect x="58" y="48" width="6" height="6" fill="#1a1a1a"/>
                    <rect x="48" y="58" width="6" height="6" fill="#1a1a1a"/>
                    <rect x="64" y="58" width="6" height="6" fill="#1a1a1a"/>
                </svg>
            </div>
        </div>
    </div>

    <script>
        function showLogin() {
            document.getElementById('welcomePage').classList.add('hidden');
            document.getElementById('loginPage').classList.add('active');
        }

        function showWelcome() {
            document.getElementById('loginPage').classList.remove('active');
            document.getElementById('welcomePage').classList.remove('hidden');
        }

        function togglePassword() {
            const field = document.getElementById('passwordField');
            field.type = field.type === 'password' ? 'text' : 'password';
        }

        function checkInputs() {
            const username = document.getElementById('usernameField').value.trim();
            const password = document.getElementById('passwordField').value.trim();
            const loginBtn = document.getElementById('loginBtn');

            if (username.length > 0 && password.length > 0) {
                loginBtn.classList.add('active');
                loginBtn.disabled = false;
            } else {
                loginBtn.classList.remove('active');
                loginBtn.disabled = true;
            }
        }
    </script>
</body>
</html>
