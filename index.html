<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhaleRadar - Splash Screen</title>
    <style>
        :root {
            --primary-green: #7fd0a5; /* اللون المستخرج من الصورة */
            --bg-color: #f7f6fb;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 360px;
            height: 580px;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* لتوزيع العناصر توب، سنتر، بوتوم */
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px; /* مسافة اللوجو العلوي */
            padding-bottom: 80px; /* مسافة الزر السفلي */
            box-sizing: border-box;
        }

        /* اللوجو العلوي (البرق) */
        .top-logo-svg {
            width: 70px;
            height: auto;
            margin-bottom: 60px;
        }

        /* الحوت في المنتصف */
        .whale-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .whale-svg {
            width: 250px; /* حجم الحوت كما يظهر في الصورة */
            height: auto;
        }

        /* الزر السفلي */
        .btn-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .get-started-btn {
            background: linear-gradient(135deg, #7fd0a5 0%, #68c091 100%);
            color: white;
            border: none;
            padding: 16px 80px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-logo-svg">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M40 10L10 50H35L20 90L85 35H55L75 10H40Z" fill="#7fd0a5"/>
            </svg>
        </div>

        <div class="whale-wrapper">
             <svg class="whale-svg" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M20,50 Q40,10 100,20 T180,40 Q200,60 180,80 T100,70 Q40,80 20,50 Z" fill="#7fd0a5" opacity="0.8"/>
                <circle cx="100" cy="45" r="3" fill="white" opacity="0.6"/>
                <circle cx="120" cy="40" r="3" fill="white" opacity="0.6"/>
                <path d="M20,50 Q5,30 10,20 Q20,30 20,50 Z" fill="#7fd0a5"/>
                <path d="M20,50 Q5,70 10,80 Q20,70 20,50 Z" fill="#7fd0a5"/>
            </svg>
        </div>

        <div class="btn-wrapper">
            <button class="get-started-btn">Get Started</button>
        </div>
    </div>

</body>
</html>
